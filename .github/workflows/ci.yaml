name: CI

on:
  pull_request:

jobs:
  check:
    name: Code check
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check code
        run: pnpm run ci
